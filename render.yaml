services:
  - type: web
    name: couple-space
    runtime: node
    branch: main
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /opt/render/project/src/storage/data
      - key: UPLOADS_DIR
        value: /opt/render/project/src/storage/uploads
    disk:
      name: couple-space-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
